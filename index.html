<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000">
<title>契約書チェック診���</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{touch-action:manipulation}
::selection{background-color:#000;color:#fff}

body {
  font-family: 'Figtree', 'Inter', 'Noto Sans JP', sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== HERO SECTION ===== */
.hero {
  padding: 80px 24px 64px;
  text-align: center;
  max-width: 600px;
  margin: 0 auto;
}

.hero-label {
  font-family: 'Figtree', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 24px;
}

.hero h1 {
  font-family: 'Figtree', 'Noto Sans JP', sans-serif;
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1.2;
  color: #fff;
}

.hero p {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: rgba(255,255,255,0.4);
  margin-top: 16px;
  line-height: 1.8;
  letter-spacing: 0.5px;
}

/* ===== WHITE CARD SECTION ===== */
.white-card {
  background: #fff;
  color: #000;
  border-radius: 32px;
  margin: 0 16px 24px;
  padding: 40px 28px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

.white-card .section-label {
  font-family: 'Figtree', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(0,0,0,0.3);
  margin-bottom: 24px;
  display: block;
}

/* Upload buttons inside white card */
.upload-buttons {
  display: flex;
  gap: 14px;
}

.upload-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 36px 16px;
  border-radius: 20px;
  border: 1.5px dashed rgba(0,0,0,0.12);
  background: rgba(0,0,0,0.02);
  color: rgba(0,0,0,0.4);
  font-size: 12px;
  font-weight: 400;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.25s ease;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.3px;
}

.upload-btn:active {
  background: rgba(0,0,0,0.06);
  border-color: rgba(0,0,0,0.25);
}

.upload-btn svg {
  width: 26px;
  height: 26px;
  stroke: rgba(0,0,0,0.25);
  stroke-width: 1.2;
}

.upload-btn span {
  text-align: center;
  line-height: 1.5;
}

input[type="file"] { display: none; }

/* File info inside white card */
.file-info {
  display: none;
  background: rgba(0,0,0,0.03);
  border-radius: 16px;
  padding: 16px 18px;
  margin-top: 20px;
  align-items: center;
  gap: 14px;
}
.file-info.active { display: flex; }

.file-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.file-icon svg {
  width: 18px; height: 18px;
  stroke: rgba(0,0,0,0.3);
  stroke-width: 1.2;
}

.file-details { flex:1; min-width:0; }
.file-name {
  font-size: 13px;
  font-weight: 500;
  color: rgba(0,0,0,0.7);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-size {
  font-size: 11px;
  color: rgba(0,0,0,0.3);
  margin-top: 2px;
}

.file-remove {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.06);
  color: rgba(0,0,0,0.3);
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* Preview image */
.preview-image {
  display: none;
  border-radius: 16px;
  overflow: hidden;
  margin-top: 20px;
}
.preview-image.active { display: block; }
.preview-image img {
  width: 100%;
  max-height: 240px;
  object-fit: contain;
  background: rgba(0,0,0,0.03);
}

/* Analyze button - black pill on white card */
.analyze-btn {
  display: none;
  width: 100%;
  padding: 18px;
  border-radius: 100px;
  border: none;
  background: #000;
  color: #fff;
  font-family: 'Figtree', 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 24px;
  transition: all 0.2s ease;
  letter-spacing: 0.5px;
  -webkit-tap-highlight-color: transparent;
}
.analyze-btn.active { display: block; }
.analyze-btn:active { background: #222; transform: scale(0.985); }
.analyze-btn:disabled { opacity: 0.25; cursor: not-allowed; }

/* ===== PROGRESS ===== */
.progress-section {
  display: none;
  padding: 56px 24px;
  text-align: center;
  max-width: 600px;
  margin: 0 auto;
}
.progress-section.active { display: block; }

.progress-animation {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 24px;
}
.progress-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  animation: dotPulse 1.4s ease-in-out infinite;
}
.progress-dot:nth-child(2) { animation-delay: 0.2s; }
.progress-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%, 80%, 100% { background: rgba(255,255,255,0.12); transform: scale(1); }
  40% { background: rgba(255,255,255,0.7); transform: scale(1.4); }
}

.progress-bar-container {
  background: rgba(255,255,255,0.06);
  border-radius: 100px;
  height: 2px;
  margin: 20px 60px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: #fff;
  border-radius: 100px;
  width: 0%;
  transition: width 0.4s ease;
}
.progress-text {
  font-family: 'Figtree', sans-serif;
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.5px;
  animation: fadeInOut 2s ease-in-out infinite;
}
@keyframes fadeInOut {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ===== RESULTS - white card ===== */
.results-section { display: none; }
.results-section.active { display: block; }

.results-card {
  background: #fff;
  color: #000;
  border-radius: 32px;
  margin: 0 16px 20px;
  padding: 36px 28px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

.results-card .results-label {
  font-family: 'Figtree', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(0,0,0,0.25);
  margin-bottom: 8px;
}

.results-card .results-count {
  font-family: 'Figtree', sans-serif;
  font-size: 11px;
  color: rgba(0,0,0,0.25);
  margin-bottom: 28px;
  display: block;
}

.concern-item {
  padding: 22px 0;
  border-top: 1px solid rgba(0,0,0,0.06);
}

.concern-item:first-of-type {
  border-top: none;
  padding-top: 0;
}

.concern-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.badge {
  font-family: 'Figtree', sans-serif;
  font-size: 9px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 100px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.badge.danger { background: #fee; color: #c0392b; }
.badge.warning { background: #fff8e1; color: #e67e22; }
.badge.info { background: #e8f4fd; color: #2980b9; }

.concern-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: rgba(0,0,0,0.85);
}

.concern-desc {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 300;
  line-height: 2;
  color: rgba(0,0,0,0.4);
}

/* LINE share */
.line-share-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px;
  border-radius: 100px;
  border: none;
  background: #06C755;
  color: #fff;
  font-family: 'Figtree', 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 24px;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.5px;
}
.line-share-btn:active { background: #05a849; transform: scale(0.985); }
.line-share-btn svg { width: 20px; height: 20px; fill: #fff; }

/* Disclaimer inside results */
.disclaimer-text {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 10px;
  font-weight: 300;
  line-height: 1.9;
  color: rgba(0,0,0,0.2);
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid rgba(0,0,0,0.05);
}

/* Reset */
.reset-section {
  text-align: center;
  padding: 0 16px;
  max-width: 600px;
  margin: 0 auto;
}
.reset-btn {
  width: 100%;
  padding: 16px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: rgba(255,255,255,0.35);
  font-family: 'Figtree', 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.5px;
}
.reset-btn:active {
  background: rgba(255,255,255,0.04);
  border-color: rgba(255,255,255,0.2);
}

/* ===== FOOTER ===== */
.site-footer {
  text-align: center;
  padding: 56px 24px 40px;
  max-width: 600px;
  margin: 0 auto;
}

.footer-label {
  font-family: 'Figtree', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.15);
  margin-bottom: 16px;
}

.site-footer a {
  font-family: 'Figtree', sans-serif;
  font-size: 13px;
  font-weight: 300;
  font-style: italic;
  color: rgba(255,255,255,0.25);
  text-decoration: none;
  letter-spacing: 0.5px;
  transition: color 0.3s;
}

.site-footer a:hover {
  color: rgba(255,255,255,0.6);
}

/* ===== CAMERA MODAL ===== */
.camera-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 1000;
  flex-direction: column;
}
.camera-modal.active { display: flex; }
.camera-preview { flex: 1; position: relative; overflow: hidden; }
.camera-preview video { width: 100%; height: 100%; object-fit: cover; }
.camera-controls {
  background: #000;
  padding: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 48px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
}
.shutter-btn {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.7);
  background: transparent;
  cursor: pointer;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.shutter-btn::after {
  content: '';
  position: absolute;
  inset: 5px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.15s ease;
}
.shutter-btn:active::after { transform: scale(0.88); }
.camera-close-btn, .camera-switch-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.08);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

#captureCanvas { display: none; }

@media (max-width: 380px) {
  .hero h1 { font-size: 28px; }
  .hero { padding: 56px 20px 48px; }
  .white-card { padding: 32px 22px; margin: 0 12px 20px; border-radius: 26px; }
  .results-card { padding: 28px 22px; margin: 0 12px 16px; border-radius: 26px; }
  .upload-btn { padding: 28px 12px; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-label">Contract Checker</div>
  <h1>契約書チェック診断</h1>
  <p>契約書をアップロードして<br>リスクや注意点を診断します</p>
</div>

<div class="white-card">
  <span class="section-label">Upload</span>
  <div class="upload-buttons">
    <button class="upload-btn" onclick="document.getElementById('pdfInput').click()">
      <svg fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
      </svg>
      <span>PDF / 画像<br>ファイル選択</span>
    </button>
    <input type="file" id="pdfInput" accept=".pdf,image/*">
    <button class="upload-btn" onclick="openCamera()">
      <svg fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/>
      </svg>
      <span>カメラで<br>撮影</span>
    </button>
  </div>

  <div class="file-info" id="fileInfo">
    <div class="file-icon">
      <svg fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
      </svg>
    </div>
    <div class="file-details">
      <div class="file-name" id="fileName"></div>
      <div class="file-size" id="fileSize"></div>
    </div>
    <button class="file-remove" onclick="removeFile()">&times;</button>
  </div>

  <div class="preview-image" id="previewImage">
    <img id="previewImg" src="" alt="preview">
  </div>

  <button class="analyze-btn" id="analyzeBtn" onclick="analyzeContract()">診断を開始する</button>
</div>

<div class="progress-section" id="progressSection">
  <div class="progress-animation">
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
  </div>
  <div class="progress-text" id="progressText">テキストを読み取っています...</div>
  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<div class="results-section" id="resultsSection"></div>

<div class="site-footer">
  <div class="footer-label">Legal</div>
  <a href="terms.html"><i>Terms of Use</i></a>
</div>

<!-- Camera Modal -->
<div class="camera-modal" id="cameraModal">
  <div class="camera-preview">
    <video id="cameraVideo" autoplay playsinline muted></video>
  </div>
  <div class="camera-controls">
    <button class="camera-close-btn" onclick="closeCamera()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
    <button class="shutter-btn" onclick="capturePhoto()"></button>
    <button class="camera-switch-btn" onclick="switchCamera()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.678 48.678 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3l-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 003.7 3.7 48.656 48.656 0 007.324 0 4.006 4.006 0 003.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3l-3 3"/>
      </svg>
    </button>
  </div>
</div>
<canvas id="captureCanvas"></canvas>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let currentFile = null;
let extractedText = '';
let cameraStream = null;
let facingMode = 'environment';

document.getElementById('pdfInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  currentFile = file;
  showFileInfo(file);
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('previewImage').classList.add('active');
    };
    reader.readAsDataURL(file);
  } else {
    document.getElementById('previewImage').classList.remove('active');
  }
  document.getElementById('analyzeBtn').classList.add('active');
});

function showFileInfo(file) {
  document.getElementById('fileName').textContent = file.name;
  const s = file.size;
  document.getElementById('fileSize').textContent = s < 1048576 ? (s/1024).toFixed(1)+' KB' : (s/1048576).toFixed(1)+' MB';
  document.getElementById('fileInfo').classList.add('active');
}

function removeFile() {
  currentFile = null; extractedText = '';
  document.getElementById('fileInfo').classList.remove('active');
  document.getElementById('previewImage').classList.remove('active');
  document.getElementById('analyzeBtn').classList.remove('active');
  document.getElementById('resultsSection').classList.remove('active');
  document.getElementById('resultsSection').innerHTML = '';
  document.getElementById('pdfInput').value = '';
}

async function openCamera() {
  document.getElementById('cameraModal').classList.add('active');
  await startCamera();
}
async function startCamera() {
  try {
    if (cameraStream) cameraStream.getTracks().forEach(t=>t.stop());
    cameraStream = await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1920},height:{ideal:1080}},audio:false});
    document.getElementById('cameraVideo').srcObject = cameraStream;
  } catch(e) { alert('カメラにアクセスできませんでした。'); closeCamera(); }
}
function closeCamera() {
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}
  document.getElementById('cameraModal').classList.remove('active');
}
async function switchCamera() {
  facingMode = facingMode==='environment'?'user':'environment';
  await startCamera();
}
function capturePhoto() {
  const v=document.getElementById('cameraVideo'), c=document.getElementById('captureCanvas');
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  c.toBlob(blob=>{
    currentFile=new File([blob],'contract_photo.jpg',{type:'image/jpeg'});
    showFileInfo(currentFile);
    document.getElementById('previewImg').src=URL.createObjectURL(blob);
    document.getElementById('previewImage').classList.add('active');
    document.getElementById('analyzeBtn').classList.add('active');
    closeCamera();
  },'image/jpeg',0.92);
}

async function analyzeContract() {
  const btn=document.getElementById('analyzeBtn'), prog=document.getElementById('progressSection'), res=document.getElementById('resultsSection');
  btn.disabled=true; prog.classList.add('active'); res.classList.remove('active'); res.innerHTML='';
  try {
    if(currentFile.type==='application/pdf') await extractFromPDF(); else await extractFromImage();
    updateProgress('契約書を分析しています...',70); await sleep(500);
    const analysis=analyzeText(extractedText);
    updateProgress('レポートを作成しています...',90); await sleep(400);
    renderResults(analysis);
    updateProgress('完了',100); await sleep(300);
    prog.classList.remove('active'); res.classList.add('active');
  } catch(e) { prog.classList.remove('active'); alert('エラーが発生しました: '+e.message); }
  btn.disabled=false;
}

async function extractFromPDF() {
  updateProgress('PDFを読み込んでいます...',10);
  const ab=await currentFile.arrayBuffer(), pdf=await pdfjsLib.getDocument({data:ab}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    updateProgress(`ページ ${i}/${pdf.numPages} を読み取り中...`,10+(50*i/pdf.numPages));
    const p=await pdf.getPage(i), c=await p.getTextContent();
    text+=c.items.map(x=>x.str).join(' ')+'\n';
  }
  extractedText=text;
}

async function extractFromImage() {
  updateProgress('画���からテキストを読み取っています...',10);
  const r=await Tesseract.recognize(currentFile,'jpn+eng',{
    logger:m=>{if(m.status==='recognizing text')updateProgress('テキストを認識中...',10+(50*m.progress));}
  });
  extractedText=r.data.text;
}

function analyzeText(text) {
  const concerns=[], warnings=[], notes=[];
  const checks=[
    {pattern:/自動更新|自動延長/,category:'danger',title:'自動更新条項',desc:'契約が自動的に更新される条項が含まれています。解約を忘れると意図せず契約が継続する恐れがあります。更新拒否の期限と手続きを確��してください。'},
    {pattern:/損害賠償.{0,30}(制限なし|上限なし|無制限|全額)/,category:'danger',title:'損害賠償の上限なし',desc:'損害賠償に上限が設定されていない可能性があります。万が一の際に多額の賠償責任を負うリスクがあ��ます。'},
    {pattern:/競業避止|競業禁止|競合禁止/,category:'danger',title:'競業避止義務',desc:'契約終了後も一定期間、競合する事業活動が制限される条項です。期間・地域・範囲が適切か確認し��ください。'},
    {pattern:/連帯保証/,category:'danger',title:'連帯保証条項',desc:'連帯保証人に関する条項が含まれています。保証人は主債務者と同等の責任を負うため、慎重な検討が必要です。'},
    {pattern:/違約金|ペナルティ|遅延損害金/,category:'danger',title:'違約金・ペナルティ条項',desc:'契約違反時の違約金やペナルティに関する記載があります。金額や条件が不当に高くないか確認してください。'},
    {pattern:/秘密保持.{0,50}(無期限|期限なし|永久|永続)/,category:'danger',title:'無期限の秘密保持義務',desc:'秘��保持義務が無期限に設定されてい���可能性があります。合理的な期間に限定することを検討してく���さい。'},
    {pattern:/解約.{0,30}(通知|届出|申出|申し出)/,category:'warning',title:'解約通知条件',desc:'解約には事前通知が必要です。通知期限（何日前・何ヶ月前）を確認し、カレンダーに記録しておくことをおすすめします。'},
    {pattern:/知的財産|著作権|特許|知財/,category:'warning',title:'知的財産権の帰属',desc:'知的財産権に関する条項があります。成果物の権利がどち��に帰属するか、利用範囲は適切か確認��てください。'},
    {pattern:/秘密保持|機密|NDA|守秘義務/,category:'warning',title:'秘密��持���務',desc:'秘密保持に関する��項があります。対象範囲、期間、例外事項が適切に定められてい���か確認してください。'},
    {pattern:/不可抗力|フォースマジュール/,category:'warning',title:'不可抗力条項',desc:'��可抗力（天災・疫病等）に関する条項があります。免責の範囲と対象が適切���確認してください。'},
    {pattern:/管轄.{0,20}(裁判所|地方裁判所)/,category:'warning',title:'管轄裁判所の指定',desc:'紛争時の管轄裁判所が指定されています。遠方の裁判所が指定されていると、訴訟時に不利になる可能性があ��ます。'},
    {pattern:/仲裁|調停/,category:'warning',title:'紛争解決方法の指定',desc:'紛��解決の方法として仲裁や調停が指定されています。裁判と比較してメリット���デメリットを理解しておきまし���う。'},
    {pattern:/契約期間|有効期間/,category:'warning',title:'契約期間',desc:'契約の有効期間に関する条項です。開始日・終了日・更新条件を明確に把握しておきまし��う。'},
    {pattern:/支払.{0,30}(遅延|延滞|滞納)/,category:'warning',title:'支払い��延に関��る条項',desc:'支払いが遅れた場合の取り扱いについて記載があります。遅延損害金の利率等を確認してください。'},
    {pattern:/中途���約|途中解約/,category:'warning',title:'中途解約条項',desc:'契約期間中の解約に関する��項です。解約時の違約金や条件を確認してく���さい。'},
    {pattern:/瑕疵|契約不適合/,category:'warning',title:'瑕疵担保・契約不適合責任',desc:'納品物に問題があった場合の責任について定められています。期間と範囲を確認してくださ��。'},
    {pattern:/免責|責任.{0,10}(負わない|除く|免除)/,category:'warning',title:'免責条項',desc:'責任を免除する条項が含まれています。どのような場合に免責されるか、範囲が広すぎないか確認してくだ���い。'},
    {pattern:/甲|乙|丙/,category:'info',title:'契約当事者の表記',desc:'甲・乙等の当事者表記があります。どちらがどの立場を指すか、冒頭の定義を確認しましょう。'},
    {pattern:/反社会的勢力|暴力団/,category:'info',title:'反社会的勢力排除条項',desc:'反社会的勢力の排除に関する条項が含まれています。これは一般的に必要な条項です。'},
    {pattern:/個人情報|プライバシー/,category:'info',title:'個人情報の取り扱い',desc:'個人情報の取り扱いに関する条項があります。収集・利用目的・第三者提供の範���を確認してください。'},
    {pattern:/委託|再委託|下請/,category:'info',title:'業務委託・再委託',desc:'業務の委託や再委託に関する条項です。再委託の可否と条件を確認してください。'},
  ];
  for(const ck of checks){
    if(ck.pattern.test(text)){
      const item={title:ck.title,desc:ck.desc,category:ck.category};
      if(ck.category==='danger')concerns.push(item);
      else if(ck.category==='warning')warnings.push(item);
      else notes.push(item);
    }
  }
  if(text.trim().length<50) concerns.push({title:'テキスト読み取り不足',desc:'契約書のテキ��トが十分に読み取れませんでした。画像が不鮮明な場合は、明るい場所で再度撮影するか、PDFファイルをアップロード��てください。',category:'danger'});

  return {concerns,warnings,notes};
}

function resetAll() {
  removeFile();
  document.getElementById('progressSection').classList.remove('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(text,pct) {
  document.getElementById('progressText').textContent=text;
  document.getElementById('progressBar').style.width=pct+'%';
}

function shareToLine() {
  const cards=document.getElementById('resultsSection').querySelectorAll('.concern-item');
  let text='【契約書チェック診断結果】\n\n';
  cards.forEach(c=>{
    const b=c.querySelector('.badge').textContent, t=c.querySelector('.concern-title').textContent;
    text+=`[${b}] ${t}\n`;
  });
  text+='\n診断はこちら:\nhttps://mayutoyoda0920-ai.github.io/contract-checker/';
  window.open('https://line.me/R/share?text='+encodeURIComponent(text),'_blank');
}

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>契約書チェック診断</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Figtree', 'Noto Sans JP', sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

::selection {
  background: #fff;
  color: #000;
}

.container {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* Header */
header {
  padding: 64px 0 56px;
  text-align: center;
}

header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #fff;
}

header p {
  font-size: 14px;
  font-weight: 300;
  color: rgba(255,255,255,0.4);
  margin-top: 12px;
  letter-spacing: 0.3px;
}

/* Upload */
.upload-section {
  margin-bottom: 32px;
}

.upload-label {
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 16px;
  display: block;
}

.upload-buttons {
  display: flex;
  gap: 12px;
}

.upload-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 32px 16px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  font-weight: 400;
  font-family: 'Figtree', 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.3px;
}

.upload-btn:active {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.15);
}

.upload-btn svg {
  width: 28px;
  height: 28px;
  stroke: rgba(255,255,255,0.3);
  stroke-width: 1.2;
}

.upload-btn span {
  text-align: center;
  line-height: 1.5;
}

input[type="file"] {
  display: none;
}

/* Camera modal */
.camera-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 1000;
  flex-direction: column;
}

.camera-modal.active {
  display: flex;
}

.camera-preview {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.camera-preview video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.camera-controls {
  background: #000;
  padding: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 48px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
}

.shutter-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.8);
  background: transparent;
  cursor: pointer;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}

.shutter-btn::after {
  content: '';
  position: absolute;
  inset: 5px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.15s ease;
}

.shutter-btn:active::after {
  transform: scale(0.88);
}

.camera-close-btn, .camera-switch-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

/* File info */
.file-info {
  display: none;
  background: rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 24px;
  border: 1px solid rgba(255,255,255,0.06);
  align-items: center;
  gap: 14px;
}

.file-info.active {
  display: flex;
}

.file-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.file-icon svg {
  width: 20px;
  height: 20px;
  stroke: rgba(255,255,255,0.4);
  stroke-width: 1.2;
}

.file-details {
  flex: 1;
  min-width: 0;
}

.file-name {
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-size {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-top: 3px;
}

.file-remove {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.4);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}

.file-remove:active {
  background: rgba(255,255,255,0.12);
}

/* Preview image */
.preview-image {
  display: none;
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 24px;
  border: 1px solid rgba(255,255,255,0.06);
}

.preview-image.active {
  display: block;
}

.preview-image img {
  width: 100%;
  max-height: 280px;
  object-fit: contain;
  background: rgba(255,255,255,0.02);
}

/* Analyze button */
.analyze-btn {
  display: none;
  width: 100%;
  padding: 18px;
  border-radius: 14px;
  border: none;
  background: #fff;
  color: #000;
  font-size: 15px;
  font-weight: 600;
  font-family: 'Figtree', 'Noto Sans JP', sans-serif;
  cursor: pointer;
  margin-bottom: 24px;
  transition: all 0.2s ease;
  letter-spacing: 0.5px;
  -webkit-tap-highlight-color: transparent;
}

.analyze-btn.active {
  display: block;
}

.analyze-btn:active {
  background: rgba(255,255,255,0.85);
  transform: scale(0.985);
}

.analyze-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* Progress */
.progress-section {
  display: none;
  padding: 60px 0;
  text-align: center;
}

.progress-section.active {
  display: block;
}

.progress-animation {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 28px;
}

.progress-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  animation: dotPulse 1.4s ease-in-out infinite;
}

.progress-dot:nth-child(2) { animation-delay: 0.2s; }
.progress-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%, 80%, 100% {
    background: rgba(255,255,255,0.15);
    transform: scale(1);
  }
  40% {
    background: rgba(255,255,255,0.8);
    transform: scale(1.3);
  }
}

.progress-bar-container {
  background: rgba(255,255,255,0.06);
  border-radius: 100px;
  height: 2px;
  margin: 20px 40px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: #fff;
  border-radius: 100px;
  width: 0%;
  transition: width 0.4s ease;
}

.progress-text {
  font-size: 13px;
  font-weight: 300;
  color: rgba(255,255,255,0.35);
  animation: fadeInOut 2s ease-in-out infinite;
}

@keyframes fadeInOut {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* Results */
.results-section {
  display: none;
}

.results-section.active {
  display: block;
}

.results-header {
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.results-count {
  color: rgba(255,255,255,0.2);
  margin-left: 8px;
  letter-spacing: 1px;
}

.concern-card {
  padding: 24px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.concern-card:last-of-type {
  border-bottom: none;
}

.concern-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 100px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.badge.danger {
  background: rgba(255,80,80,0.12);
  color: #ff6b6b;
}

.badge.warning {
  background: rgba(255,180,50,0.12);
  color: #f0b040;
}

.badge.info {
  background: rgba(120,170,255,0.12);
  color: #88b4ff;
}

.concern-title {
  font-size: 15px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
}

.concern-desc {
  font-size: 13px;
  font-weight: 300;
  line-height: 2;
  color: rgba(255,255,255,0.4);
}

/* Disclaimer */
.disclaimer-card {
  margin-top: 40px;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.disclaimer-card p {
  font-size: 11px;
  font-weight: 300;
  line-height: 1.8;
  color: rgba(255,255,255,0.2);
}

/* LINE share button */
.line-share-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: #06C755;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Figtree', 'Noto Sans JP', sans-serif;
  cursor: pointer;
  margin-top: 24px;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.5px;
}

.line-share-btn:active {
  background: #05b34c;
  transform: scale(0.985);
}

.line-share-btn svg {
  width: 22px;
  height: 22px;
  fill: #fff;
}

/* Reset button */
.reset-btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  font-weight: 500;
  font-family: 'Figtree', 'Noto Sans JP', sans-serif;
  cursor: pointer;
  margin-top: 24px;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.5px;
}

.reset-btn:active {
  background: rgba(255,255,255,0.04);
  border-color: rgba(255,255,255,0.15);
}

/* Footer */
.site-footer {
  text-align: center;
  padding: 48px 0 24px;
  margin-top: 48px;
}

.site-footer a {
  color: rgba(255,255,255,0.2);
  font-size: 11px;
  font-weight: 400;
  text-decoration: none;
  letter-spacing: 1px;
  transition: color 0.2s;
}

.site-footer a:hover {
  color: rgba(255,255,255,0.5);
}

/* Canvas */
#captureCanvas {
  display: none;
}

/* Responsive */
@media (max-width: 380px) {
  header h1 { font-size: 24px; }
  header { padding: 48px 0 40px; }
  .upload-btn { padding: 24px 12px; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>契約書チェック診断</h1>
    <p>契約書をアップロードして、リスクや注意点を診断します</p>
  </header>

  <div class="upload-section">
    <span class="upload-label">Upload</span>
    <div class="upload-buttons">
      <button class="upload-btn" onclick="document.getElementById('pdfInput').click()">
        <svg fill="none" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
        <span>PDF / 画像<br>ファイル選択</span>
      </button>
      <input type="file" id="pdfInput" accept=".pdf,image/*">

      <button class="upload-btn" onclick="openCamera()">
        <svg fill="none" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/>
        </svg>
        <span>カメラで<br>撮影</span>
      </button>
    </div>
  </div>

  <div class="file-info" id="fileInfo">
    <div class="file-icon">
      <svg fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
      </svg>
    </div>
    <div class="file-details">
      <div class="file-name" id="fileName"></div>
      <div class="file-size" id="fileSize"></div>
    </div>
    <button class="file-remove" onclick="removeFile()">&times;</button>
  </div>

  <div class="preview-image" id="previewImage">
    <img id="previewImg" src="" alt="preview">
  </div>

  <button class="analyze-btn" id="analyzeBtn" onclick="analyzeContract()">診断を開始する</button>

  <div class="progress-section" id="progressSection">
    <div class="progress-animation">
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
    </div>
    <div class="progress-text" id="progressText">テキストを読み取っています...</div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="results-section" id="resultsSection"></div>

  <div class="site-footer">
    <a href="terms.html">Terms of Use</a>
  </div>
</div>

<!-- Camera Modal -->
<div class="camera-modal" id="cameraModal">
  <div class="camera-preview">
    <video id="cameraVideo" autoplay playsinline muted></video>
  </div>
  <div class="camera-controls">
    <button class="camera-close-btn" onclick="closeCamera()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
    <button class="shutter-btn" onclick="capturePhoto()"></button>
    <button class="camera-switch-btn" onclick="switchCamera()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 00-3.7-3.7 48.678 48.678 0 00-7.324 0 4.006 4.006 0 00-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3l-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 003.7 3.7 48.656 48.656 0 007.324 0 4.006 4.006 0 003.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3l-3 3"/>
      </svg>
    </button>
  </div>
</div>

<canvas id="captureCanvas"></canvas>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let currentFile = null;
let extractedText = '';
let cameraStream = null;
let facingMode = 'environment';

document.getElementById('pdfInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  currentFile = file;
  showFileInfo(file);

  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('previewImage').classList.add('active');
    };
    reader.readAsDataURL(file);
  } else {
    document.getElementById('previewImage').classList.remove('active');
  }

  document.getElementById('analyzeBtn').classList.add('active');
});

function showFileInfo(file) {
  document.getElementById('fileName').textContent = file.name;
  const size = file.size;
  const sizeStr = size < 1024 * 1024
    ? (size / 1024).toFixed(1) + ' KB'
    : (size / (1024 * 1024)).toFixed(1) + ' MB';
  document.getElementById('fileSize').textContent = sizeStr;
  document.getElementById('fileInfo').classList.add('active');
}

function removeFile() {
  currentFile = null;
  extractedText = '';
  document.getElementById('fileInfo').classList.remove('active');
  document.getElementById('previewImage').classList.remove('active');
  document.getElementById('analyzeBtn').classList.remove('active');
  document.getElementById('resultsSection').classList.remove('active');
  document.getElementById('resultsSection').innerHTML = '';
  document.getElementById('pdfInput').value = '';
}

async function openCamera() {
  document.getElementById('cameraModal').classList.add('active');
  await startCamera();
}

async function startCamera() {
  try {
    if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    document.getElementById('cameraVideo').srcObject = cameraStream;
  } catch (err) {
    alert('カメラにアクセスできませんでした。');
    closeCamera();
  }
}

function closeCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('cameraModal').classList.remove('active');
}

async function switchCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await startCamera();
}

function capturePhoto() {
  const video = document.getElementById('cameraVideo');
  const canvas = document.getElementById('captureCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  canvas.toBlob(function(blob) {
    currentFile = new File([blob], 'contract_photo.jpg', { type: 'image/jpeg' });
    showFileInfo(currentFile);
    document.getElementById('previewImg').src = URL.createObjectURL(blob);
    document.getElementById('previewImage').classList.add('active');
    document.getElementById('analyzeBtn').classList.add('active');
    closeCamera();
  }, 'image/jpeg', 0.92);
}

async function analyzeContract() {
  const btn = document.getElementById('analyzeBtn');
  const progress = document.getElementById('progressSection');
  const results = document.getElementById('resultsSection');

  btn.disabled = true;
  progress.classList.add('active');
  results.classList.remove('active');
  results.innerHTML = '';

  try {
    if (currentFile.type === 'application/pdf') await extractFromPDF();
    else await extractFromImage();

    updateProgress('契約書を分析しています...', 70);
    await sleep(500);
    const analysis = analyzeText(extractedText);
    updateProgress('レポートを作成しています...', 90);
    await sleep(400);
    renderResults(analysis);
    updateProgress('完了', 100);
    await sleep(300);
    progress.classList.remove('active');
    results.classList.add('active');
  } catch (err) {
    progress.classList.remove('active');
    alert('エラーが発生しました: ' + err.message);
  }
  btn.disabled = false;
}

async function extractFromPDF() {
  updateProgress('PDFを読み込んでいます...', 10);
  const arrayBuffer = await currentFile.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    updateProgress(`ページ ${i}/${pdf.numPages} を読み取り中...`, 10 + (50 * i / pdf.numPages));
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(' ') + '\n';
  }
  extractedText = text;
}

async function extractFromImage() {
  updateProgress('画像からテキストを読み取っています...', 10);
  const result = await Tesseract.recognize(currentFile, 'jpn+eng', {
    logger: m => {
      if (m.status === 'recognizing text') updateProgress('テキストを認識中...', 10 + (50 * m.progress));
    }
  });
  extractedText = result.data.text;
}

function analyzeText(text) {
  const concerns = [], warnings = [], notes = [];

  const checks = [
    { pattern: /自動更新|自動延長/, category: 'danger', title: '自動更新条項', desc: '契約が自動的に更新される条項が含まれています。解約を忘れると意図せず契約が継続する恐れがあります。更新拒否の期限と手続きを確認してください。' },
    { pattern: /損害賠償.{0,30}(制限なし|上限なし|無制限|全額)/, category: 'danger', title: '損害賠償の上限なし', desc: '損害賠償に上限が設定されていない可能性があります。万が一の際に多額の賠償責任を負うリスクがあります。' },
    { pattern: /競業避止|競業禁止|競合禁止/, category: 'danger', title: '競業避止義務', desc: '契約終了後も一定期間、競合する事業活動が制限される条項です。期間・地域・範囲が適切か確認してください。' },
    { pattern: /連帯保証/, category: 'danger', title: '連帯保証条項', desc: '連帯保証人に関する条項が含まれています。保証人は主債務者と同等の責任を負うため、慎重な検討が必要です。' },
    { pattern: /違約金|ペナルティ|遅延損害金/, category: 'danger', title: '違約金・ペナルティ条項', desc: '契約違反時の違約金やペナルティに関する記載があります。金額や条件が不当に高くないか確認してください。' },
    { pattern: /秘密保持.{0,50}(無期限|期限なし|永久|永続)/, category: 'danger', title: '無期限の秘密保持義務', desc: '秘密保持義務が無期限に設定されている可能性があります。合理的な期間に限定することを検討してください。' },
    { pattern: /解約.{0,30}(通知|届出|申出|申し出)/, category: 'warning', title: '解約通知条件', desc: '解約には事前通知が必要です。通知期限（何日前・何ヶ月前）を確認し、カレンダーに記録しておくことをおすすめします。' },
    { pattern: /知的財産|著作権|特許|知財/, category: 'warning', title: '知的財産権の帰属', desc: '知的財産権に関する条項があります。成果物の権利がどちらに帰属するか、利用範囲は適切か確認してください。' },
    { pattern: /秘密保持|機密|NDA|守秘義務/, category: 'warning', title: '秘密保持義務', desc: '秘密保持に関する条項があります。対象範囲、期間、例外事項が適切に定められているか確認してください。' },
    { pattern: /不可抗力|フォースマジュール/, category: 'warning', title: '不可抗力条項', desc: '不可抗力（天災・疫病等）に関する条項があります。免責の範囲と対象が適切か確認してください。' },
    { pattern: /管轄.{0,20}(裁判所|地方裁判所)/, category: 'warning', title: '管轄裁判所の指定', desc: '紛争時の管轄裁判所が指定されています。遠方の裁判所が指定されていると、訴訟時に不利になる可能性があります。' },
    { pattern: /仲裁|調停/, category: 'warning', title: '紛争解決方法の指定', desc: '紛争解決の方法として仲裁や調停が指定されています。裁判と比較してメリット・デメリットを理解しておきましょう。' },
    { pattern: /契約期間|有効期間/, category: 'warning', title: '契約期間', desc: '契約の有効期間に関する条項です。開始日・終了日・更新条件を明確に把握しておきましょう。' },
    { pattern: /支払.{0,30}(遅延|延滞|滞納)/, category: 'warning', title: '支払い遅延に関する条項', desc: '支払いが遅れた場合の取り扱いについて記載があります。遅延損害金の利率等を確認してください。' },
    { pattern: /中途解約|途中解約/, category: 'warning', title: '中途解約条項', desc: '契約期間中の解約に関する条項です。解約時の違約金や条件を確認してください。' },
    { pattern: /瑕疵|契約不適合/, category: 'warning', title: '瑕疵担保・契約不適合責任', desc: '納品物に問題があった場合の責任について定められています。期間と範囲を確認してください。' },
    { pattern: /免責|責任.{0,10}(負わない|除く|免除)/, category: 'warning', title: '免責条項', desc: '責任を免除する条項が含まれています。どのような場合に免責されるか、範囲が広すぎないか確認してください。' },
    { pattern: /甲|乙|丙/, category: 'info', title: '契約当事者の表記', desc: '甲・乙等の当事者表記があります。どちらがどの立場を指すか、冒頭の定義を確認しましょう。' },
    { pattern: /反社会的勢力|暴力団/, category: 'info', title: '反社会的勢力排除条項', desc: '反社会的勢力の排除に関する条項が含まれています。これは一般的に必要な条項です。' },
    { pattern: /個人情報|プライバシー/, category: 'info', title: '個人情報の取り扱い', desc: '個人情報の取り扱いに関する条項があります。収集・利用目的・第三者提供の範囲を確認してください。' },
    { pattern: /委託|再委託|下請/, category: 'info', title: '業務委託・再委託', desc: '業務の委託や再委託に関する条項です。再委託の可否と条件を確認してください。' },
  ];

  for (const check of checks) {
    if (check.pattern.test(text)) {
      const item = { title: check.title, desc: check.desc, category: check.category };
      if (check.category === 'danger') concerns.push(item);
      else if (check.category === 'warning') warnings.push(item);
      else notes.push(item);
    }
  }

  if (text.trim().length < 50) {
    concerns.push({ title: 'テキスト読み取り不足', desc: '契約書のテキストが十分に読み取れませんでした。画像が不鮮明な場合は、明るい場所で再度撮影するか、PDFファイルをアップロードしてください。', category: 'danger' });
  }

  if (concerns.length === 0 && warnings.length === 0 && text.trim().length >= 50) {
    notes.push({ title: '特筆すべきリスクは検出されませんでした', desc: 'キーワードベースの自動チェックでは大きなリスクは検出されませんでした。ただし、これは法的な保証ではありません。重要な契約の場合は専門家への相談をおすすめします。', category: 'info' });
  }

  return { concerns, warnings, notes };
}

function renderResults(analysis) {
  const container = document.getElementById('resultsSection');
  const allItems = [...analysis.concerns, ...analysis.warnings, ...analysis.notes];
  let html = '';

  html += `<div class="results-header">診断結果<span class="results-count">${allItems.length} items</span></div>`;

  const badgeLabel = { danger: '要注意', warning: '確認推奨', info: '参考' };

  for (const item of allItems) {
    html += `
      <div class="concern-card ${item.category}">
        <div class="concern-header">
          <span class="badge ${item.category}">${badgeLabel[item.category]}</span>
          <span class="concern-title">${item.title}</span>
        </div>
        <div class="concern-desc">${item.desc}</div>
      </div>
    `;
  }

  html += `
    <button class="line-share-btn" onclick="shareToLine()">
      <svg viewBox="0 0 24 24"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.271.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
      LINEで結果を共有
    </button>
    <div class="disclaimer-card">
      <p>本診断はキーワードベースの簡易チェックであり、法的なアドバイスを構成するものではありません。重要な契約については、必ず弁護士等の専門家にご相談ください。</p>
    </div>
    <button class="reset-btn" onclick="resetAll()">最初からやり直す</button>
  `;

  container.innerHTML = html;
}

function resetAll() {
  removeFile();
  document.getElementById('progressSection').classList.remove('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress(text, percent) {
  document.getElementById('progressText').textContent = text;
  document.getElementById('progressBar').style.width = percent + '%';
}

function shareToLine() {
  const results = document.getElementById('resultsSection');
  const cards = results.querySelectorAll('.concern-card');
  let text = '【契約書チェック診断結果】\n\n';

  cards.forEach(card => {
    const badge = card.querySelector('.badge').textContent;
    const title = card.querySelector('.concern-title').textContent;
    text += `[${badge}] ${title}\n`;
  });

  text += '\n診断はこちら:\nhttps://mayutoyoda0920-ai.github.io/contract-checker/';

  const lineUrl = 'https://line.me/R/share?text=' + encodeURIComponent(text);
  window.open(lineUrl, '_blank');
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
</script>
</body>
</html>
